
name: Update APT Repository

on:
  push:
    branches:
      - main

concurrency:
  group: apt-repository-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils gzip

      - name: Generate APT metadata
        run: |
          set -e

          cd repo

          mkdir -p dists/stable/main/binary-all

          dpkg-scanpackages pool /dev/null \
            > dists/stable/main/binary-all/Packages

          gzip -9 -kf dists/stable/main/binary-all/Packages

          cat > ../apt-release.conf <<EOF
          APT::FTPArchive::Release::Origin "SnowOS";
          APT::FTPArchive::Release::Label "SnowOS Repository";
          APT::FTPArchive::Release::Suite "stable";
          APT::FTPArchive::Release::Codename "stable";
          APT::FTPArchive::Release::Architectures "all";
          APT::FTPArchive::Release::Components "main";
          EOF

          apt-ftparchive \
            -c ../apt-release.conf \
            release dists/stable \
            > dists/stable/Release

      - name: Commit generated metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add repo/dists

          if git diff --cached --quiet; then
            echo "No metadata changes."
            exit 0
          fi

          git commit -m "Update APT repository metadata"

          git pull --rebase origin main

          git push origin main
