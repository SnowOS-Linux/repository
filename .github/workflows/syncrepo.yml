name: Update APT Repository

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils gzip

      - name: Generate APT metadata
        run: |
          set -e

          mkdir -p repo/dists/stable/main/binary-all

          dpkg-scanpackages repo/pool /dev/null \
            > repo/dists/stable/main/binary-all/Packages

          gzip -9 -kf repo/dists/stable/main/binary-all/Packages

          apt-ftparchive release repo/dists/stable \
            > repo/dists/stable/Release

      - name: Commit generated metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add repo/dists

          if git diff --cached --quiet; then
            echo "No metadata changes."
            exit 0
          fi

          git commit -m "Update APT repository metadata"
          git push
